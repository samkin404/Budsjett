<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0f1e">
<title>Budsjett</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0f1e;--surface:#111827;--surface2:#1a2236;
  --border:rgba(255,255,255,0.07);--accent:#4ade80;--accent2:#38bdf8;
  --danger:#f87171;--warn:#fbbf24;--text:#f1f5f9;--muted:#64748b;
  --mono:'DM Mono',monospace;--sans:'Syne',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden;-webkit-overflow-scrolling:touch}
.app{height:100dvh;display:flex;flex-direction:column;max-width:430px;margin:0 auto}
.topbar{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
.topbar h1{font-size:18px;font-weight:800;letter-spacing:-.5px}
.month-nav{display:flex;align-items:center;gap:10px}
.month-nav button{background:var(--surface2);border:none;color:var(--text);width:28px;height:28px;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.month-label{font-family:var(--mono);font-size:13px;color:var(--accent2);min-width:80px;text-align:center}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px 100px}
.scroll::-webkit-scrollbar{display:none}
.hero{background:linear-gradient(135deg,#0f2027,#1a3a2a);border:1px solid rgba(74,222,128,.2);border-radius:20px;padding:20px;margin-bottom:14px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;background:radial-gradient(circle,rgba(74,222,128,.15) 0%,transparent 70%);pointer-events:none}
.hero .label{font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.income-display{font-family:var(--mono);font-size:32px;font-weight:500;color:var(--accent);letter-spacing:-1px;cursor:pointer;display:flex;align-items:center;gap:8px}
.edit-hint{font-size:11px;color:var(--muted);font-family:var(--sans)}
.income-input-wrap{display:none;align-items:center}
.hero-input{font-family:var(--mono);font-size:28px;background:transparent;border:none;border-bottom:2px solid var(--accent);color:var(--accent);width:100%;outline:none;padding:2px 0}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px}
.s-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.s-val{font-family:var(--mono);font-size:16px;font-weight:500;margin-top:2px}
.s-val.green{color:var(--accent)}.s-val.red{color:var(--danger)}.s-val.blue{color:var(--accent2)}.s-val.warn{color:var(--warn)}
.section{margin-bottom:14px}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:0 4px;margin-bottom:8px}
.section-title{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-weight:600}
.section-right{display:flex;align-items:center;gap:10px}
.section-total{font-family:var(--mono);font-size:13px;color:var(--text)}
.add-btn{background:var(--surface2);border:1px solid rgba(74,222,128,.3);color:var(--accent);border-radius:8px;padding:5px 12px;font-size:12px;font-family:var(--sans);font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}
.expense-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:2px}
.expense-row{display:flex;align-items:center;padding:10px 12px;gap:10px;border-bottom:1px solid var(--border)}
.expense-row:last-child{border-bottom:none}
.expense-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.expense-info{flex:1;min-width:0}
.expense-name-input{font-size:13px;font-weight:600;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);outline:none;width:100%;font-family:var(--sans);padding:1px 0}
.expense-note-input{font-size:10px;color:var(--muted);background:transparent;border:none;outline:none;width:100%;font-family:var(--sans);margin-top:2px}
.expense-amount{font-family:var(--mono);font-size:14px;color:var(--accent2);cursor:pointer;flex-shrink:0;padding:4px 8px;border-radius:8px;border:1px solid transparent}
.expense-amount-input{font-family:var(--mono);font-size:14px;color:var(--accent);background:rgba(74,222,128,.08);border:1px solid var(--accent);border-radius:8px;padding:4px 8px;width:90px;outline:none;text-align:right;display:none}
.delete-btn{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:6px;flex-shrink:0;-webkit-tap-highlight-color:transparent}

/* BOTTOM SHEET - iOS safe */
.sheet-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0);
  z-index:200;pointer-events:none;
  transition:background 0.3s;
}
.sheet-overlay.open{background:rgba(0,0,0,.6);pointer-events:all}
.sheet{
  position:fixed;bottom:0;left:50%;transform:translate(-50%,100%);
  width:100%;max-width:430px;
  background:var(--surface);
  border-radius:20px 20px 0 0;
  padding:20px 20px max(24px,env(safe-area-inset-bottom));
  z-index:201;
  transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);
}
.sheet.open{transform:translate(-50%,0)}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:99px;margin:0 auto 18px}
.sheet h3{font-size:16px;font-weight:800;margin-bottom:16px}
.sheet-input{
  width:100%;background:var(--surface2);
  border:1px solid var(--border);border-radius:12px;
  color:var(--text);font-family:var(--sans);font-size:16px;
  padding:13px 14px;outline:none;margin-bottom:10px;
  -webkit-appearance:none;
}
.sheet-input:focus{border-color:var(--accent2)}
.sheet-btns{display:flex;gap:10px;margin-top:6px}
.sheet-btn{flex:1;padding:14px;border:none;border-radius:12px;font-family:var(--sans);font-size:15px;font-weight:800;cursor:pointer;-webkit-tap-highlight-color:transparent}
.sheet-btn.primary{background:var(--accent);color:#0a0f1e}
.sheet-btn.secondary{background:var(--surface2);color:var(--text)}

.history-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.history-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)}
.history-row:last-child{border-bottom:none}
.history-month{font-size:13px;color:var(--text)}
.history-income{font-family:var(--mono);font-size:12px;color:var(--muted)}
.history-right{display:flex;align-items:center;gap:10px}
.history-left{font-family:var(--mono);font-size:13px;font-weight:500}
.history-del{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px;-webkit-tap-highlight-color:transparent}

.bottomnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(10,15,30,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom));z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;background:none;border:none;cursor:pointer;color:var(--muted);-webkit-tap-highlight-color:transparent}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:22px;height:22px}
.nav-btn span{font-size:10px;font-family:var(--sans);font-weight:600;letter-spacing:.05em}
.tab{display:none}.tab.active{display:block}
.save-btn{width:100%;padding:14px;background:var(--accent);color:#0a0f1e;border:none;border-radius:14px;font-family:var(--sans);font-size:15px;font-weight:800;cursor:pointer;margin-top:12px;-webkit-tap-highlight-color:transparent}
.hint{text-align:center;font-size:11px;color:var(--muted);margin-bottom:8px}
.empty-state{text-align:center;padding:30px 20px;color:var(--muted);font-size:14px}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <h1>Budsjett <span id="year-label" style="font-weight:400;color:var(--muted);font-size:14px"></span></h1>
    <div class="month-nav">
      <button onclick="changeMonth(-1)">&#8249;</button>
      <span class="month-label" id="month-label"></span>
      <button onclick="changeMonth(1)">&#8250;</button>
    </div>
  </div>

  <div class="scroll">
    <div class="tab active" id="tab-oversikt">
      <div class="hero">
        <div class="label">Månedsinntekt</div>
        <div class="income-display" id="income-display" onclick="startIncomeEdit()">
          <span id="income-val">56 000 kr</span>
          <span class="edit-hint">trykk for å endre</span>
        </div>
        <div class="income-input-wrap" id="income-input-wrap">
          <input class="hero-input" id="income-input" type="number" inputmode="numeric"
            onblur="commitIncomeEdit()" onkeydown="if(event.key==='Enter')commitIncomeEdit()">
        </div>
        <div class="summary-grid">
          <div><div class="s-label">Faste utgifter</div><div class="s-val warn" id="sum-fixed">–</div></div>
          <div><div class="s-label">Variable utgifter</div><div class="s-val blue" id="sum-var">–</div></div>
          <div><div class="s-label">Sparing (10%)</div><div class="s-val green" id="sum-save">–</div></div>
          <div><div class="s-label">Til overs</div><div class="s-val green" id="sum-left">–</div></div>
        </div>
      </div>

      <div class="hint">Trykk beløp for å endre · Trykk navn for å redigere · ✕ for å slette</div>

      <div class="section">
        <div class="section-header">
          <span class="section-title">Faste utgifter</span>
          <div class="section-right">
            <span class="section-total" id="fixed-total"></span>
            <button class="add-btn" onclick="openSheet('fixed')">+ Legg til</button>
          </div>
        </div>
        <div class="expense-card" id="fixed-list"></div>
      </div>

      <div class="section">
        <div class="section-header">
          <span class="section-title">Variable utgifter</span>
          <div class="section-right">
            <span class="section-total" id="var-total"></span>
            <button class="add-btn" onclick="openSheet('variable')">+ Legg til</button>
          </div>
        </div>
        <div class="expense-card" id="var-list"></div>
      </div>

      <button class="save-btn" onclick="saveMonth()">Lagre denne måneden</button>
    </div>

    <div class="tab" id="tab-historikk">
      <div class="section">
        <div class="section-header"><span class="section-title">Tidligere måneder</span></div>
        <div id="history-content"></div>
      </div>
    </div>
  </div>

  <nav class="bottomnav">
    <button class="nav-btn active" id="nav-oversikt" onclick="showTab('oversikt')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>Oversikt</span>
    </button>
    <button class="nav-btn" id="nav-historikk" onclick="showTab('historikk')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span>Historikk</span>
    </button>
  </nav>
</div>

<!-- BOTTOM SHEET -->
<div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <h3 id="sheet-title">Legg til utgift</h3>
  <input class="sheet-input" id="sheet-name" type="text" placeholder="Navn (f.eks. Spotify)" autocomplete="off">
  <input class="sheet-input" id="sheet-note" type="text" placeholder="Notat (valgfritt)" autocomplete="off">
  <input class="sheet-input" id="sheet-amount" type="number" inputmode="numeric" placeholder="Beløp i kr">
  <div class="sheet-btns">
    <button class="sheet-btn secondary" onclick="closeSheet()">Avbryt</button>
    <button class="sheet-btn primary" onclick="commitAdd()">Legg til</button>
  </div>
</div>

<script>
const MONTHS=['Januar','Februar','Mars','April','Mai','Juni','Juli','August','September','Oktober','November','Desember'];
const SAVINGS_PCT=0.10;
const ICONS=['🏠','🚗','📱','⚡','🌐','🎬','📺','💪','⛳','🔋','🛒','🎯','🍽️','👟','🎲','💊','✈️','🐾','🎓','💈'];
const COLORS=['#1e3a5f','#1e3a3a','#1e2a3a','#3a2e10','#2a1e10','#3a1a1a','#2a1a3a','#1a3a1e','#2a2a2a','#1a2e3a'];

const DEFAULT_FIXED=[
  {id:'bolig',name:'Boligavdrag',amount:20000,note:'Månedlig avdrag',icon:'🏠',color:'#1e3a5f'},
  {id:'bil',name:'Bilforsikring',amount:855,note:'Gjensidige',icon:'🚗',color:'#1e3a3a'},
  {id:'mobil',name:'Mobilabonnement',amount:328,note:'Fast pris',icon:'📱',color:'#1e2a3a'},
  {id:'strom',name:'Strøm',amount:1287,note:'Variabelt snitt',icon:'⚡',color:'#3a2e10'},
  {id:'inet',name:'Internett',amount:799,note:'Fast abonnement',icon:'🌐',color:'#1e2a3a'},
  {id:'netflix',name:'Netflix',amount:189,note:'Strømmetjeneste',icon:'🎬',color:'#3a1a1a'},
  {id:'viaplay',name:'Viaplay',amount:699,note:'Strømmetjeneste',icon:'📺',color:'#2a1a3a'},
  {id:'gym',name:'Treningssenter',amount:402,note:'Fast abonnement',icon:'💪',color:'#1a3a1e'},
  {id:'golf',name:'Golf',amount:402,note:'Fast abonnement',icon:'⛳',color:'#1a3a1e'},
  {id:'leasing',name:'Elbil leasing',amount:5500,note:'Valgt modell',icon:'🔋',color:'#1a2e3a'},
];
const DEFAULT_VAR=[
  {id:'mat',name:'Mat og dagligvarer',amount:5200,note:'67% av mnd hjemme',icon:'🛒',color:'#2a1e10'},
  {id:'lading',name:'Lading elbil',amount:300,note:'Lav vs. bensin',icon:'⚡',color:'#3a2e10'},
  {id:'klar',name:'Klær og sko',amount:1000,note:'Månedlig snitt',icon:'👟',color:'#2a1a3a'},
  {id:'rest',name:'Restauranter / kafe',amount:1500,note:'Inkl. lunsj ute',icon:'🍽️',color:'#3a1a1a'},
  {id:'fritid',name:'Fritid og hobby',amount:1500,note:'Underholdning',icon:'🎯',color:'#1a3a1e'},
  {id:'div',name:'Diverse / uforutsett',amount:1000,note:'Buffer',icon:'🎲',color:'#2a2a2a'},
];

let currentYear=new Date().getFullYear();
let currentMonth=new Date().getMonth();
let addingTo=null;

function ls(key,def){try{const v=localStorage.getItem(key);return v!==null?JSON.parse(v):def}catch(e){return def}}
function lss(key,val){try{localStorage.setItem(key,JSON.stringify(val))}catch(e){}}

function getItems(type){return ls('items_'+type,JSON.parse(JSON.stringify(type==='fixed'?DEFAULT_FIXED:DEFAULT_VAR)))}
function setItems(type,items){lss('items_'+type,items)}
function getIncome(y,m){return ls('bud_'+y+'_'+m,{}).income||56000}
function getMonthData(y,m){return ls('bud_'+y+'_'+m,{})}
function setMonthData(y,m,d){lss('bud_'+y+'_'+m,d)}
function fmt(n){return Math.round(n).toLocaleString('nb-NO')+' kr'}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5)}

function updateSummary(){
  const income=getIncome(currentYear,currentMonth);
  document.getElementById('income-val').textContent=fmt(income);
  const ft=getItems('fixed').reduce((s,x)=>s+x.amount,0);
  const vt=getItems('variable').reduce((s,x)=>s+x.amount,0);
  const sav=Math.round(income*SAVINGS_PCT);
  const left=income-ft-vt-sav;
  document.getElementById('sum-fixed').textContent=fmt(ft);
  document.getElementById('sum-var').textContent=fmt(vt);
  document.getElementById('sum-save').textContent=fmt(sav);
  document.getElementById('fixed-total').textContent=fmt(ft);
  document.getElementById('var-total').textContent=fmt(vt);
  const el=document.getElementById('sum-left');
  el.textContent=fmt(left);
  el.className='s-val '+(left>=0?'green':'red');
}

function renderList(containerId,type){
  const items=getItems(type);
  const el=document.getElementById(containerId);
  if(!items.length){el.innerHTML='<div class="empty-state">Ingen kategorier ennå</div>';return}
  el.innerHTML=items.map((item,i)=>`
    <div class="expense-row">
      <div class="expense-icon" style="background:${item.color}">${item.icon}</div>
      <div class="expense-info">
        <input class="expense-name-input" value="${item.name}"
          onchange="updateField('${type}',${i},'name',this.value)">
        <input class="expense-note-input" value="${item.note||''}" placeholder="Notat..."
          onchange="updateField('${type}',${i},'note',this.value)">
      </div>
      <input class="expense-amount-input" id="ainp_${type}_${i}" type="number" inputmode="numeric" value="${item.amount}"
        onblur="commitAmt('${type}',${i})" onkeydown="if(event.key==='Enter')this.blur()">
      <span class="expense-amount" id="amt_${type}_${i}" onclick="startAmt('${type}',${i})">${fmt(item.amount)}</span>
      <button class="delete-btn" onclick="deleteItem('${type}',${i})">✕</button>
    </div>`).join('');
}

function updateField(type,i,field,val){
  const items=getItems(type);
  if(items[i])items[i][field]=val;
  setItems(type,items);
  updateSummary();
}

function startAmt(type,i){
  document.getElementById('amt_'+type+'_'+i).style.display='none';
  const inp=document.getElementById('ainp_'+type+'_'+i);
  inp.style.display='block';inp.focus();inp.select();
}
function commitAmt(type,i){
  const inp=document.getElementById('ainp_'+type+'_'+i);
  const span=document.getElementById('amt_'+type+'_'+i);
  if(!inp||!span)return;
  const val=parseInt(inp.value)||0;
  const items=getItems(type);
  if(items[i])items[i].amount=val;
  setItems(type,items);
  span.textContent=fmt(val);
  inp.style.display='none';span.style.display='block';
  updateSummary();
}

function deleteItem(type,i){
  if(!confirm('Slette denne kategorien?'))return;
  const items=getItems(type);
  items.splice(i,1);
  setItems(type,items);
  renderList(type==='fixed'?'fixed-list':'var-list',type);
  updateSummary();
}

function openSheet(type){
  addingTo=type;
  document.getElementById('sheet-title').textContent=type==='fixed'?'Legg til fast utgift':'Legg til variabel utgift';
  document.getElementById('sheet-name').value='';
  document.getElementById('sheet-note').value='';
  document.getElementById('sheet-amount').value='';
  document.getElementById('sheet-overlay').classList.add('open');
  document.getElementById('sheet').classList.add('open');
  setTimeout(()=>document.getElementById('sheet-name').focus(),400);
}
function closeSheet(){
  document.getElementById('sheet-overlay').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
  addingTo=null;
}
function commitAdd(){
  const name=document.getElementById('sheet-name').value.trim();
  const note=document.getElementById('sheet-note').value.trim();
  const amount=parseInt(document.getElementById('sheet-amount').value)||0;
  if(!name)return;
  const items=getItems(addingTo);
  items.push({id:uid(),name,note,amount,icon:ICONS[Math.floor(Math.random()*ICONS.length)],color:COLORS[Math.floor(Math.random()*COLORS.length)]});
  setItems(addingTo,items);
  closeSheet();
  renderList(addingTo==='fixed'?'fixed-list':'var-list',addingTo);
  updateSummary();
}

function startIncomeEdit(){
  document.getElementById('income-display').style.display='none';
  document.getElementById('income-input-wrap').style.display='flex';
  const inp=document.getElementById('income-input');
  inp.value=getIncome(currentYear,currentMonth);
  inp.focus();inp.select();
}
function commitIncomeEdit(){
  const val=parseInt(document.getElementById('income-input').value)||56000;
  const d=getMonthData(currentYear,currentMonth);
  d.income=val;setMonthData(currentYear,currentMonth,d);
  document.getElementById('income-display').style.display='flex';
  document.getElementById('income-input-wrap').style.display='none';
  updateDisplay();
}

function saveMonth(){
  const income=getIncome(currentYear,currentMonth);
  const ft=getItems('fixed').reduce((s,x)=>s+x.amount,0);
  const vt=getItems('variable').reduce((s,x)=>s+x.amount,0);
  const sav=Math.round(income*SAVINGS_PCT);
  const left=income-ft-vt-sav;
  setMonthData(currentYear,currentMonth,{income,ft,vt,sav,left,saved:true});
  const btn=document.querySelector('.save-btn');
  btn.textContent='✓ Lagret!';btn.style.background='#22c55e';
  setTimeout(()=>{btn.textContent='Lagre denne måneden';btn.style.background='var(--accent)'},1800);
}

function changeMonth(dir){
  currentMonth+=dir;
  if(currentMonth>11){currentMonth=0;currentYear++}
  if(currentMonth<0){currentMonth=11;currentYear--}
  updateDisplay();
}

function updateDisplay(){
  document.getElementById('month-label').textContent=MONTHS[currentMonth];
  document.getElementById('year-label').textContent=currentYear;
  renderList('fixed-list','fixed');
  renderList('var-list','variable');
  updateSummary();
}

function showTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if(name==='historikk')renderHistory();
}

function renderHistory(){
  const el=document.getElementById('history-content');
  const entries=[];
  for(let i=0;i<localStorage.length;i++){
    const key=localStorage.key(i);
    if(key&&key.startsWith('bud_')&&!key.startsWith('bud_amounts')){
      try{
        const d=JSON.parse(localStorage.getItem(key));
        if(d&&d.saved){
          const p=key.split('_');
          if(p.length===3)entries.push({key,year:parseInt(p[1]),month:parseInt(p[2]),...d});
        }
      }catch(e){}
    }
  }
  entries.sort((a,b)=>b.year-a.year||b.month-a.month);
  if(!entries.length){
    el.innerHTML='<div class="empty-state">Ingen lagrede måneder ennå.<br>Lagre en måned fra Oversikt-fanen.</div>';
    return;
  }
  el.innerHTML='<div class="history-card">'+entries.map(e=>{
    const color=e.left>=0?'var(--accent)':'var(--danger)';
    return `<div class="history-row">
      <div>
        <div class="history-month">${MONTHS[e.month]} ${e.year}</div>
        <div class="history-income">Inntekt: ${fmt(e.income)}</div>
      </div>
      <div class="history-right">
        <div class="history-left" style="color:${color}">${e.left>=0?'+':''}${fmt(e.left)}</div>
        <button class="history-del" onclick="deleteHistory('${e.key}')">🗑</button>
      </div>
    </div>`;
  }).join('')+'</div>';
}

function deleteHistory(key){
  if(confirm('Slette denne måneden fra historikken?')){
    localStorage.removeItem(key);renderHistory();
  }
}

updateDisplay();
</script>

</html>
